<head>

  />
  <link rel="canonical" href="https://augmentis-systems.com/klarorder-demo" />
  <meta name="theme-color" content="#f6f4ef" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="de_DE" />
  <meta property="og:site_name" content="Augmentis Systems" />
  <meta property="og:title" content="KlarOrder Demo | Augmentis Systems" />
  <meta property="og:description" content="Interaktive Produktdemo für den Auftragseingang im SHK-Großhandel." />
  <meta property="og:url" content="https://augmentis-systems.com/klarorder-demo" />
  <meta property="og:image" content="https://augmentis-systems.com/assets/klarorder-review.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="KlarOrder Demo | Augmentis Systems" />
  <meta name="twitter:description" content="Interaktive Produktdemo für den Auftragseingang im SHK-Großhandel." />
  <meta name="twitter:image" content="https://augmentis-systems.com/assets/klarorder-review.png" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <script defer data-domain="augmentis-systems.com" src="https://plausible.io/js/script.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --text: #14171f;
      --text-muted: #4a5364;
      --border: rgba(20, 23, 31, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      font-family: Inter, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
    }

    .page {
      min-height: 100vh;
    }

    .demo-frame {
      display: block;
      width: 100%;
      min-height: 100vh;
      border: 0;
      background: var(--bg);
    }

    .fallback {
      display: none;
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1.25rem 2.5rem;
    }

    .fallback h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .fallback p {
      margin: 0 0 1rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .fallback a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }

    @media (max-width: 860px) {
      .demo-frame {
        min-height: 1600px;
      }
    }

    @media (max-width: 720px) {
      .demo-frame {
        display: none;
      }

      .fallback {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <iframe
      class="demo-frame"
      title="KlarOrder Demo"
      src="https://augmentis-klarorder-demo.vercel.app/demo"
      loading="eager"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>

    <section class="fallback">
      <h1>KlarOrder Demo</h1>
      <p>
        Die öffentliche Demo wird auf kleineren Geräten besser direkt geöffnet, damit die freigegebene
        Workbench ohne zusätzlichen Rahmen sichtbar bleibt.
      </p>
      <a href="https://augmentis-klarorder-demo.vercel.app/demo" target="_blank" rel="noreferrer">
        Demo im neuen Tab öffnen
      </a>
    </section>
  </main>
</body>
</html>
